<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bem-vindo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(80,80,100,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(60,60,80,0.14) 0%, transparent 55%),
        linear-gradient(135deg, #1a1a1e 0%, #2c2c32 50%, #111114 100%);
      background-attachment: fixed;
      color: #f0f0f2;
    }

    .mensagem {
      text-align: center;
      animation: fadeIn 1.2s ease forwards;
    }

    .mensagem h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.04em;
      opacity: 0;
      animation: aparecer 1s ease 0.3s forwards;
    }

    .mensagem p {
      font-size: 15px;
      color: #8a8a96;
      margin-top: 12px;
      opacity: 0;
      animation: aparecer 1s ease 0.8s forwards;
    }

    .linha {
      width: 0;
      height: 1px;
      background: #f0f0f2;
      margin: 20px auto;
      animation: expandir 0.8s ease 1.2s forwards;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes expandir {
      from { width: 0; }
      to   { width: 180px; }
    }
  </style>
</head>
<body>

  <div class="mensagem">
    <h1>Bem-vindo ao nosso projeto</h1>
    <div class="linha"></div>
    <p>Redirecionando...</p>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 5000);
  </script>

</body>
</html>
